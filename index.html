<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmFun chat emulator</title>
  <style>
    :root {
      --max: #2f7df6;
      --max-dark: #165dcc;
      --ink: #172033;
      --muted: #6f7b8f;
      --line: rgba(23, 32, 51, 0.12);
      --chat: #f2f5fb;
      --bubble: #ffffff;
      --user: #dcecff;
      --button: #eef5ff;
      --shadow: 0 26px 70px rgba(23, 32, 51, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 203, 71, 0.32), transparent 26%),
        radial-gradient(circle at 82% 18%, rgba(47, 125, 246, 0.2), transparent 28%),
        linear-gradient(145deg, #eaf3ff 0%, #d8edff 48%, #d9efc8 100%);
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 414px;
      gap: clamp(20px, 4vw, 52px);
      align-items: center;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: clamp(18px, 4vw, 44px);
    }

    .note {
      max-width: 560px;
    }

    .note h1 {
      margin: 0 0 16px;
      font-size: clamp(38px, 6vw, 68px);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .note p {
      margin: 0 0 16px;
      color: #42536c;
      font-size: 18px;
      line-height: 1.5;
    }

    .note-card {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      align-items: center;
      max-width: 460px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.64);
      box-shadow: 0 16px 36px rgba(23, 32, 51, 0.1);
    }

    .note-card img {
      width: 92px;
      height: 92px;
      border-radius: 16px;
      object-fit: cover;
    }

    .note-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 16px;
    }

    .note-card span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .phone {
      position: relative;
      width: min(100vw - 28px, 392px);
      height: min(860px, calc(100vh - 36px));
      min-height: 740px;
      margin: 0 auto;
      border: 10px solid #111827;
      border-radius: 38px;
      background: #111827;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      z-index: 20;
      width: 118px;
      height: 28px;
      border-radius: 0 0 18px 18px;
      background: #111827;
      transform: translateX(-50%);
    }

    .screen {
      position: relative;
      height: 100%;
      border-radius: 28px;
      background: var(--chat);
      overflow: hidden;
    }

    .statusbar {
      height: 42px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 22px 8px;
      background: rgba(255, 255, 255, 0.92);
      color: #182033;
      font-size: 13px;
      font-weight: 850;
    }

    .status-icons {
      display: flex;
      gap: 5px;
      align-items: center;
      font-size: 12px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .chat {
      position: absolute;
      inset: 42px 0 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        radial-gradient(circle at 22% 10%, rgba(47, 125, 246, 0.1), transparent 24%),
        var(--chat);
    }

    .chat-head {
      display: grid;
      grid-template-columns: 38px 1fr 38px;
      gap: 10px;
      align-items: center;
      min-height: 62px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
    }

    .head-btn {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--max);
      font-size: 24px;
      cursor: pointer;
    }

    .head-btn.reset {
      background: #edf2f8;
      color: #4f5c70;
      font-size: 19px;
    }

    .bot-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 900;
    }

    .avatar {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(145deg, #fff59d, #f18437);
      box-shadow: 0 6px 14px rgba(160, 88, 31, 0.22);
      font-size: 20px;
    }

    .bot-sub {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 9px;
      padding: 14px 12px;
      overflow: auto;
      scroll-behavior: smooth;
    }

    .day {
      align-self: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(103, 117, 138, 0.16);
      color: #66758b;
      font-size: 12px;
      font-weight: 800;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .row.user {
      justify-content: flex-end;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      background: linear-gradient(145deg, #fff59d, #f18437);
      font-size: 16px;
    }

    .bubble {
      max-width: 292px;
      padding: 10px 12px;
      border-radius: 18px 18px 18px 5px;
      background: var(--bubble);
      box-shadow: 0 4px 14px rgba(23, 32, 51, 0.08);
      font-size: 14px;
      line-height: 1.36;
      white-space: pre-line;
    }

    .user .bubble {
      border-radius: 18px 18px 5px 18px;
      background: var(--user);
    }

    .card {
      width: 292px;
      overflow: hidden;
      border-radius: 20px;
      background: white;
      box-shadow: 0 12px 28px rgba(23, 32, 51, 0.12);
    }

    .card img {
      display: block;
      width: 100%;
      height: 178px;
      object-fit: cover;
      background: #d9edf6;
    }

    .card-body {
      padding: 12px;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-line;
    }

    .time {
      display: block;
      margin-top: 5px;
      color: #7b879a;
      font-size: 11px;
      text-align: right;
    }

    .inline {
      display: grid;
      gap: 7px;
      padding: 0 12px 12px;
      background: white;
    }

    .inline.two {
      grid-template-columns: 1fr 1fr;
    }

    .inline-btn {
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      background: var(--button);
      color: var(--max-dark);
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .inline-btn.primary {
      color: white;
      background: linear-gradient(180deg, #3c89ff, var(--max-dark));
      box-shadow: 0 8px 16px rgba(47, 125, 246, 0.24);
    }

    .inline-btn.green {
      color: white;
      background: linear-gradient(180deg, #42b96e, #1d8747);
      box-shadow: 0 8px 16px rgba(47, 155, 93, 0.24);
    }

    .inline-btn.orange {
      color: white;
      background: linear-gradient(180deg, #ffb340, #f27b32);
      box-shadow: 0 8px 16px rgba(242, 123, 50, 0.24);
    }

    .inline-btn:disabled {
      cursor: default;
      opacity: 0.5;
      box-shadow: none;
      filter: grayscale(0.4);
    }

    .composer-wrap {
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      padding: 10px 12px 8px;
    }

    .quick button {
      min-height: 38px;
      border: 0;
      border-radius: 12px;
      background: #eef5ff;
      color: var(--max-dark);
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr 38px;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .field {
      min-height: 38px;
      padding: 9px 12px;
      border-radius: 19px;
      background: #edf2f8;
      color: #7b879a;
      font-size: 14px;
    }

    .send {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 50%;
      background: var(--max);
      color: white;
      font-size: 18px;
    }

    .toast {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 92px;
      z-index: 30;
      padding: 12px 14px;
      border-radius: 15px;
      background: #1e2d1b;
      color: white;
      box-shadow: 0 14px 30px rgba(23, 32, 51, 0.24);
      transform: translateY(90px);
      opacity: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
      text-align: center;
      font-size: 14px;
      font-weight: 900;
      pointer-events: none;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 920px) {
      body {
        background: #dfe7f2;
      }

      .stage {
        grid-template-columns: 1fr;
        place-items: center;
        padding: 14px;
      }

      .note {
        display: none;
      }
    }

    @media (max-width: 430px) {
      .stage {
        padding: 0;
      }

      .phone {
        width: 100vw;
        height: 100vh;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }

      .phone::before {
        display: none;
      }

      .screen {
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="note">
      <h1>FarmFun в чате MAX</h1>
      <p>Это эмулятор именно чатовой игры: бот присылает твои картинки, под сообщением появляются inline-кнопки, игрок нажимает их прямо в диалоге.</p>
      <div class="note-card">
        <img src="./farm/stage_5.png" alt="">
        <div>
          <strong>Без мини-приложения</strong>
          <span>Только чат, картинки и кнопки, как в боте.</span>
        </div>
      </div>
    </section>

    <section class="phone" aria-label="Эмулятор телефона">
      <div class="screen">
        <div class="statusbar">
          <span id="clock">20:30</span>
          <span class="status-icons"><span class="dot"></span><span class="dot"></span><span class="dot"></span> LTE 84%</span>
        </div>

        <section class="chat" aria-label="Чат FarmFun Bot">
          <header class="chat-head">
            <button class="head-btn" type="button" aria-label="Назад">‹</button>
            <div>
              <div class="bot-name"><span class="avatar">🌻</span> FarmFun Bot</div>
              <div class="bot-sub" id="botSub">бот в MAX · обучение</div>
            </div>
            <button class="head-btn reset" id="resetButton" type="button" aria-label="Сбросить">↻</button>
          </header>

          <div class="messages" id="messages"></div>

          <div class="composer-wrap">
            <div class="composer">
              <div class="field">Сообщение</div>
              <button class="send" type="button" aria-label="Отправить">↑</button>
            </div>
          </div>
        </section>

        <div class="toast" id="toast" role="status" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "farmfun-chat-emulator-v1";
    const TUTORIAL_SECONDS = 10;

    const images = {
      stage1: "./farm/stage_1.png",
      stage2: "./farm/stage_2.png",
      stage3: "./farm/stage_3.png",
      stage4: "./farm/stage_4.png",
      stage5: "./farm/stage_5.png",
      petrovitchDefault: "https://storage.yandexcloud.net/farmfun-images/petrovitch/default.png",
      petrovitchHappy: "https://storage.yandexcloud.net/farmfun-images/petrovitch/happy.png",
      petrovitchThinking: "https://storage.yandexcloud.net/farmfun-images/petrovitch/thinking.png",
      petrovitchWarning: "https://storage.yandexcloud.net/farmfun-images/petrovitch/warning.png"
    };

    const crops = {
      carrot: { name: "Морковка", icon: "🥕", points: 10, seconds: TUTORIAL_SECONDS },
      tomato: { name: "Помидор", icon: "🍅", points: 25, seconds: TUTORIAL_SECONDS }
    };

    const nowTime = () => new Date().toLocaleTimeString("ru-RU", {
      hour: "2-digit",
      minute: "2-digit"
    });

    const startMessages = () => [
      { type: "day", text: "Сегодня" },
      {
        type: "card",
        avatar: "👨‍🌾",
        image: images.petrovitchDefault,
        text: "О, новый сосед! Я Петрович, участок вон там, за забором.\n\nПойдем ко мне - покажу что тут к чему, а потом за твой возьмемся!",
        time: "20:29",
        actions: [{ id: "onboarding", label: "Пойдем!", style: "primary" }]
      }
    ];

    const defaultState = () => ({
      score: 20,
      harvests: 0,
      crop: null,
      transcript: startMessages()
    });

    let state = loadState();
    let toastTimer = null;
    const messagesEl = document.getElementById("messages");
    const toast = document.getElementById("toast");

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!parsed || !Array.isArray(parsed.transcript)) return defaultState();
        return { ...defaultState(), ...parsed };
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function formatLeft(seconds) {
      return `${Math.max(0, Math.ceil(seconds))} сек`;
    }

    function progress() {
      if (!state.crop) return { ready: false, left: 0, percent: 0 };
      const duration = state.crop.watered ? state.crop.seconds * 0.65 : state.crop.seconds;
      const elapsed = (Date.now() - state.crop.plantedAt) / 1000;
      const percent = Math.min(100, Math.max(0, (elapsed / duration) * 100));
      return {
        ready: percent >= 100,
        left: Math.max(0, duration - elapsed),
        percent
      };
    }

    function addMessage(message) {
      state.transcript.push({
        time: nowTime(),
        ...message
      });
      saveState();
      render();
    }

    function addUser(text) {
      state.transcript.push({ type: "user", text, time: nowTime() });
    }

    function lastActionIndex() {
      for (let i = state.transcript.length - 1; i >= 0; i -= 1) {
        if (state.transcript[i].actions?.length) return i;
      }
      return -1;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function buttonClass(action) {
      return ["inline-btn", action.style || ""].filter(Boolean).join(" ");
    }

    function renderActions(actions, enabled) {
      if (!actions?.length) return "";
      const cls = actions.length > 1 ? "inline two" : "inline";
      const buttons = actions.map((action) => `
        <button
          class="${buttonClass(action)}"
          type="button"
          data-action="${escapeHtml(action.id)}"
          ${enabled ? "" : "disabled"}
        >${escapeHtml(action.label)}</button>
      `).join("");
      return `<div class="${cls}">${buttons}</div>`;
    }

    function renderMessage(message, index, activeIndex) {
      if (message.type === "day") {
        return `<div class="day">${escapeHtml(message.text)}</div>`;
      }

      if (message.type === "user") {
        return `
          <div class="row user">
            <div class="bubble">${escapeHtml(message.text)}<span class="time">${escapeHtml(message.time)}</span></div>
          </div>
        `;
      }

      if (message.type === "card") {
        return `
          <div class="row">
            <div class="msg-avatar">${escapeHtml(message.avatar || "🌻")}</div>
            <div class="card">
              <img src="${escapeHtml(message.image)}" alt="">
              <div class="card-body">${escapeHtml(message.text)}<span class="time">${escapeHtml(message.time)}</span></div>
              ${renderActions(message.actions, index === activeIndex)}
            </div>
          </div>
        `;
      }

      return `
        <div class="row">
          <div class="msg-avatar">${escapeHtml(message.avatar || "🌻")}</div>
          <div>
            <div class="bubble">${escapeHtml(message.text)}<span class="time">${escapeHtml(message.time)}</span></div>
            ${renderActions(message.actions, index === activeIndex)}
          </div>
        </div>
      `;
    }

    function render() {
      const activeIndex = lastActionIndex();
      messagesEl.innerHTML = state.transcript
        .map((message, index) => renderMessage(message, index, activeIndex))
        .join("");

      for (const button of messagesEl.querySelectorAll("[data-action]")) {
        button.addEventListener("click", () => handleAction(button.dataset.action));
      }

      document.getElementById("botSub").textContent =
        `бот в MAX · ${state.score} очков · ${state.harvests} урожаев`;
      scrollBottom();
      for (const image of messagesEl.querySelectorAll("img")) {
        image.addEventListener("load", scrollBottom, { once: true });
      }
      setTimeout(scrollBottom, 60);
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function sendPlantIntro() {
      addUser("Пойдем!");
      addMessage({
        type: "card",
        avatar: "👨‍🌾",
        image: images.stage1,
        text: "Вот твоя первая грядка.\n\nНачнем с морковки: она простая, быстро растет и дает первые очки.",
        actions: [{ id: "plant_carrot", label: "Посадить морковку", style: "green" }]
      });
    }

    function plant(cropId) {
      const crop = crops[cropId];
      addUser(`Посадить ${crop.name.toLowerCase()}`);
      state.crop = {
        id: cropId,
        name: crop.name,
        icon: crop.icon,
        points: crop.points,
        seconds: crop.seconds,
        plantedAt: Date.now(),
        watered: false,
        notified: false
      };
      saveState();
      addMessage({
        type: "card",
        avatar: "🌻",
        image: images.stage2,
        text: `${crop.name} посажена!\n\n+20 очков за старт. Теперь можно полить или проверить, сколько осталось.`,
        actions: [
          { id: "water", label: "Полить", style: "primary" },
          { id: "check", label: "Когда созреет?" }
        ]
      });
    }

    function water() {
      if (!state.crop) return sendGarden();
      if (state.crop.watered) {
        showToast("Грядка уже полита");
        return;
      }
      addUser("Полить");
      state.crop.watered = true;
      saveState();
      addMessage({
        type: "card",
        avatar: "👨‍🌾",
        image: images.petrovitchThinking,
        text: "Ну вот! Полив принят.\n\nРост ускорился. В настоящей игре ты бы закрыл чат и вернулся по пушу.",
        actions: [{ id: "check", label: "Проверить готовность", style: "primary" }]
      });
    }

    function checkReady() {
      if (!state.crop) return sendGarden();
      const p = progress();
      addUser("Когда созреет?");
      if (p.ready) {
        addMessage({
          type: "card",
          avatar: "🌻",
          image: images.stage5,
          text: `${state.crop.name} созрела!\n\nЖми сбор урожая.`,
          actions: [{ id: "harvest", label: "Собрать!", style: "orange" }]
        });
        return;
      }

      addMessage({
        type: "card",
        avatar: "👨‍🌾",
        image: p.percent > 55 ? images.stage4 : images.stage3,
        text: `Еще растет.\n\nОсталось примерно ${formatLeft(p.left)}. Можно нажать проверку позже.`,
        actions: [
          ...(state.crop.watered ? [] : [{ id: "water", label: "Полить", style: "primary" }]),
          { id: "check", label: "Проверить еще раз" }
        ]
      });
    }

    function harvest() {
      if (!state.crop) return sendGarden();
      const p = progress();
      if (!p.ready) return checkReady();
      const crop = state.crop;
      addUser("Собрать!");
      state.score += crop.points;
      state.harvests += 1;
      state.crop = null;
      saveState();
      addMessage({
        type: "card",
        avatar: "👨‍🌾",
        image: images.petrovitchHappy,
        text: `Ну вот! Первый урожай собран.\n\n+${crop.points} очков. Моя школа!`,
        actions: [
          { id: "tomato_intro", label: "Дальше", style: "primary" },
          { id: "rating", label: "Рейтинг" }
        ]
      });
    }

    function tomatoIntro() {
      addUser("Дальше");
      addMessage({
        type: "card",
        avatar: "👨‍🌾",
        image: images.petrovitchThinking,
        text: "А вот помидор посерьезнее.\n\nРастет дольше, зато очков больше. Для демо снова ускорим таймер.",
        actions: [{ id: "plant_tomato", label: "Посадить помидор", style: "green" }]
      });
    }

    function sendGarden() {
      addUser("Огород");
      if (!state.crop) {
        addMessage({
          type: "card",
          avatar: "🌻",
          image: images.stage1,
          text: "Грядка пустая.\n\nВыбери, что посадить.",
          actions: [
            { id: "plant_carrot", label: "Морковка", style: "green" },
            { id: "plant_tomato", label: "Помидор" }
          ]
        });
        return;
      }
      const p = progress();
      addMessage({
        type: "card",
        avatar: "🌻",
        image: p.ready ? images.stage5 : p.percent > 55 ? images.stage4 : images.stage3,
        text: p.ready
          ? `${state.crop.name} готова к сбору.`
          : `${state.crop.name} растет.\n\nОсталось примерно ${formatLeft(p.left)}.`,
        actions: p.ready
          ? [{ id: "harvest", label: "Собрать!", style: "orange" }]
          : [
              ...(state.crop.watered ? [] : [{ id: "water", label: "Полить", style: "primary" }]),
              { id: "check", label: "Когда созреет?" }
            ]
      });
    }

    function sendRating() {
      addUser("Рейтинг");
      const rows = [
        ["Петрович", 140],
        ["Ты", state.score],
        ["Соседка Нина", 55],
        ["Дачник Max", 30]
      ].sort((a, b) => b[1] - a[1]);
      const text = rows.map((row, index) => `#${index + 1} ${row[0]} - ${row[1]} очков`).join("\n");
      addMessage({
        type: "bubble",
        avatar: "🏆",
        text: `Рейтинг соседей:\n\n${text}`,
        actions: [{ id: "garden", label: "Назад в огород", style: "primary" }]
      });
    }

    function sendShop() {
      addUser("Магазин");
      addMessage({
        type: "card",
        avatar: "🛒",
        image: images.stage4,
        text: "Магазин демо:\n\nУдобрение - 29 руб\nСуперполив - 49 руб\nДоп. грядка - 99 руб\n\nОплаты тут нет, только показ сценария.",
        actions: [{ id: "garden", label: "Назад в огород", style: "primary" }]
      });
    }

    function handleAction(action) {
      if (action === "onboarding") return sendPlantIntro();
      if (action === "plant_carrot") return plant("carrot");
      if (action === "plant_tomato") return plant("tomato");
      if (action === "water") return water();
      if (action === "check") return checkReady();
      if (action === "harvest") return harvest();
      if (action === "tomato_intro") return tomatoIntro();
      if (action === "rating") return sendRating();
      if (action === "shop") return sendShop();
      if (action === "garden") return sendGarden();
    }

    function maybeNotifyReady() {
      if (!state.crop || state.crop.notified) return;
      const p = progress();
      if (!p.ready) return;
      state.crop.notified = true;
      saveState();
      addMessage({
        type: "card",
        avatar: "🌻",
        image: images.stage5,
        text: `${state.crop.name} созрела!\n\nЭто имитация пуша в чате. Собери урожай.`,
        actions: [{ id: "harvest", label: "Собрать!", style: "orange" }]
      });
    }

    document.getElementById("resetButton").addEventListener("click", () => {
      state = defaultState();
      saveState();
      render();
      showToast("Демо сброшено");
    });

    function updateClock() {
      document.getElementById("clock").textContent = nowTime();
    }

    render();
    updateClock();
    setInterval(updateClock, 30000);
    setInterval(maybeNotifyReady, 500);
  </script>
</body>
</html>
